<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task · WhatsApp Form</title>
  <!-- Font Awesome (optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1a2b 0%, #1a2f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .form-card {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.7), 0 2px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .form-card:hover {
      transform: scale(1.005);
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1e2f3f;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.3rem;
      letter-spacing: -0.5px;
    }

    h1 i {
      color: #25D366;
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(37, 211, 102, 0.3));
    }

    .subhead {
      color: #4b5f6e;
      font-weight: 400;
      font-size: 0.95rem;
      border-left: 4px solid #25D366;
      padding-left: 1rem;
      margin-bottom: 2rem;
      background: #eef4f8;
      border-radius: 0 20px 20px 0;
      padding: 0.6rem 1.2rem;
      display: inline-block;
    }

    .form-group {
      margin-bottom: 1.6rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: #1d2e3b;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    label i {
      color: #25D366;
      width: 1.2rem;
      font-size: 1rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.8rem 1.2rem;
      border: 1.5px solid #dce6ed;
      border-radius: 1.8rem;
      font-size: 1rem;
      background: #fafcfe;
      transition: all 0.15s ease;
      outline: none;
      color: #1a2b37;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.15);
      background: #ffffff;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      border-radius: 1.8rem;
    }

    .row-duo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .row-duo .form-group {
      flex: 1 1 180px;
    }

    .priority-group {
      display: inline-flex;
      flex-wrap: nowrap;
      gap: 0.6rem;
      align-items: center;
      background: #f0f5fa;
      padding: 0.2rem 0.8rem 0.2rem 0.8rem;
      border-radius: 60px;
      border: 1px solid #dce6ed;
      width: auto;
    }

    .priority-option {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: transparent;
      padding: 0.2rem 0.6rem 0.2rem 0.2rem;
      border-radius: 40px;
      transition: 0.1s;
      white-space: nowrap;
    }

    .priority-option input[type="radio"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #b6c9d6;
      border-radius: 50%;
      margin: 0;
      padding: 0;
      background: white;
      transition: 0.1s;
      flex-shrink: 0;
      cursor: pointer;
    }

    .priority-option input[type="radio"]:checked {
      border-color: #25D366;
      background: #25D366;
      box-shadow: inset 0 0 0 4px white, 0 0 0 1px #25D366;
    }

    .priority-option label {
      font-weight: 450;
      font-size: 0.9rem;
      color: #1d2e3b;
      cursor: pointer;
      margin: 0;
      padding-right: 0.2rem;
    }

    .priority-group-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 1.2rem;
    }

    .priority-label {
      font-weight: 500;
      color: #1d2e3b;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .priority-label i {
      color: #25D366;
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      border: none;
      padding: 1rem 1.8rem;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 60px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px -8px rgba(37, 211, 102, 0.4);
      margin-top: 0.8rem;
      letter-spacing: 0.3px;
    }

    .btn-whatsapp i {
      font-size: 1.6rem;
    }

    .btn-whatsapp:hover {
      background: #1fa855;
      transform: scale(1.01);
      box-shadow: 0 12px 28px -8px #1fa85580;
    }

    .btn-whatsapp:active {
      transform: scale(0.97);
    }

    .footnote {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.8rem;
      color: #6b7f8d;
      border-top: 1px solid #e2ebf2;
      padding-top: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
    }

    .footnote i {
      color: #25D366;
    }

    .preview-box {
      background: #f0f5fa;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-top: 0.5rem;
      border-left: 4px solid #25D366;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      color: #1d2e3b;
      max-height: 200px;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 0.8rem;
      color: #4b5f6e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    @media (max-width: 480px) {
      .form-card {
        padding: 1.8rem 1.2rem;
      }
      h1 {
        font-size: 1.7rem;
      }
      .row-duo {
        flex-direction: column;
        gap: 0;
      }
      .priority-group {
        flex-wrap: nowrap;
        padding: 0.2rem 0.6rem;
        gap: 0.3rem;
      }
      .priority-option {
        padding: 0.1rem 0.3rem 0.1rem 0.1rem;
      }
      .priority-option label {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

<div class="form-card">
  <h1>
    <i class="fab fa-whatsapp"></i> Task · WhatsApp
  </h1>
  <div class="subhead">
    <i class="fas fa-arrow-right" style="margin-right: 8px;"></i> Fill & send — clean format for WhatsApp
  </div>

  <form id="taskForm" onsubmit="sendToWhatsApp(event)">
    <!-- Task title -->
    <div class="form-group">
      <label for="taskTitle"><i class="fas fa-tag"></i> Task title</label>
      <input type="text" id="taskTitle" placeholder="e.g. Design homepage" required>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="taskDesc"><i class="fas fa-align-left"></i> Description</label>
      <textarea id="taskDesc" placeholder="Describe the task in detail …" required></textarea>
    </div>

    <!-- Due date + priority (row) -->
    <div class="row-duo">
      <div class="form-group">
        <label for="dueDate"><i class="fas fa-calendar-alt"></i> Due date</label>
        <input type="date" id="dueDate" required>
      </div>
      <div class="form-group">
        <div class="priority-group-wrapper">
          <span class="priority-label">
            <i class="fas fa-flag"></i> Priority
          </span>
          <span class="priority-group">
            <span class="priority-option">
              <input type="radio" name="priority" value="High" id="high" checked>
              <label for="high">High</label>
            </span>
            <span class="priority-option">
              <input type="radio" name="priority" value="Medium" id="medium">
              <label for="medium">Medium</label>
            </span>
            <span class="priority-option">
              <input type="radio" name="priority" value="Low" id="low">
              <label for="low">Low</label>
            </span>
          </span>
        </div>
      </div>
    </div>

    <!-- Assignee (optional) -->
    <div class="form-group">
      <label for="assignee"><i class="fas fa-user-check"></i> Assignee (optional)</label>
      <input type="text" id="assignee" placeholder="e.g. Maria or @team">
    </div>



    <!-- Submit button -->
    <button type="submit" class="btn-whatsapp">
      <i class="fab fa-whatsapp"></i> Send task to WhatsApp
    </button>
  </form>

  <div class="footnote">
    <i class="fas fa-message"></i> 
    <span>Opens WhatsApp with clean, readable task details</span>
    <i class="fas fa-arrow-right" style="font-size: 0.7rem;"></i>
  </div>
</div>

<script>
  // Live preview update
  document.addEventListener('DOMContentLoaded', function() {
    const titleInput = document.getElementById('taskTitle');
    const descInput = document.getElementById('taskDesc');
    const dateInput = document.getElementById('dueDate');
    const assigneeInput = document.getElementById('assignee');
    const priorityRadios = document.querySelectorAll('input[name="priority"]');
    const previewBox = document.getElementById('previewBox');

    function updatePreview() {
      const title = titleInput.value.trim() || '[Your task title]';
      const desc = descInput.value.trim() || '[Your description]';
      const dueDate = dateInput.value ? formatDate(dateInput.value) : '24 Jun 2026';
      const priority = document.querySelector('input[name="priority"]:checked')?.value || 'High';
      const assignee = assigneeInput.value.trim() || '[Assignee name]';

      previewBox.textContent = 
`*TASK DETAILS*
═════════════════════
Title: ${title}
Description: ${desc}
Due date: ${dueDate}
Priority: ${priority}
Assignee: ${assignee}
═════════════════════
`;
    }

    // Attach events
    titleInput.addEventListener('input', updatePreview);
    descInput.addEventListener('input', updatePreview);
    dateInput.addEventListener('change', updatePreview);
    assigneeInput.addEventListener('input', updatePreview);
    priorityRadios.forEach(radio => radio.addEventListener('change', updatePreview));

    // Initial preview
    updatePreview();
  });

  /**
   * Builds a formatted task message and redirects to WhatsApp.
   */
  function sendToWhatsApp(event) {
    event.preventDefault();

    // Gather form values
    const title = document.getElementById('taskTitle').value.trim();
    const desc = document.getElementById('taskDesc').value.trim();
    const dueDate = document.getElementById('dueDate').value;
    const assignee = document.getElementById('assignee').value.trim() || 'Not assigned';
    const priorityRadio = document.querySelector('input[name="priority"]:checked');
    const priority = priorityRadio ? priorityRadio.value : 'Medium';

    // Validation
    if (!title || !desc || !dueDate) {
      alert('⚠️ Please fill in Title, Description and Due date.');
      return;
    }

    // Clean, WhatsApp-friendly format (no emojis, simple separators)
    const formattedMessage = 
`*TASK DETAILS*
═════════════════════
Title: ${title}
Description: ${desc}
Due date: ${formatDate(dueDate)}
Priority: ${priority}
Assignee: ${assignee}
═════════════════════
Task submitted via form`;

    // WhatsApp URL
    const phoneNumber = '9503804591'; // Replace with your WhatsApp number
    const encodedMessage = encodeURIComponent(formattedMessage);
    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

    // Open WhatsApp
    window.open(whatsappUrl, '_blank');
  }

  /**
   * Format date from YYYY-MM-DD to readable (e.g., 24 Jun 2026)
   */
  function formatDate(dateString) {
    if (!dateString) return 'Not set';
    const parts = dateString.split('-');
    if (parts.length !== 3) return dateString;
    const year = parts[0];
    const month = parseInt(parts[1], 10);
    const day = parseInt(parts[2], 10);
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const monthName = monthNames[month - 1] || '??';
    return `${day} ${monthName} ${year}`;
  }

  // Set default due date to tomorrow
  (function setDefaultDate() {
    const dateInput = document.getElementById('dueDate');
    if (dateInput) {
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const year = tomorrow.getFullYear();
      const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
      const day = String(tomorrow.getDate()).padStart(2, '0');
      dateInput.value = `${year}-${month}-${day}`;
    }
  })();
</script>

<noscript>
  <div style="background:#ffd; padding:1rem; border-radius:20px; margin-top:1rem; text-align:center;">
    <i class="fas fa-exclamation-triangle"></i> JavaScript required for WhatsApp redirect.
  </div>
</noscript>

</body>
</html>
