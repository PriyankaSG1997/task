<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Task · WhatsApp Form</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1a2b 0%, #1a2f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .form-card {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1e2f3f;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }

    h1 i {
      color: #25D366;
      font-size: 1.8rem;
    }

    .subhead {
      color: #4b5f6e;
      font-size: 0.9rem;
      border-left: 4px solid #25D366;
      padding: 0.5rem 1rem;
      margin-bottom: 1.8rem;
      background: #eef4f8;
      border-radius: 0 20px 20px 0;
      display: inline-block;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: #1d2e3b;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    label i {
      color: #25D366;
      width: 1.2rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #dce6ed;
      border-radius: 1.8rem;
      font-size: 1rem;
      background: #fafcfe;
      transition: all 0.15s ease;
      outline: none;
      color: #1a2b37;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.15);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .row-duo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .row-duo .form-group {
      flex: 1 1 160px;
      min-width: 140px;
    }

    .priority-group {
      display: inline-flex;
      flex-wrap: nowrap;
      gap: 0.4rem;
      align-items: center;
      background: #f0f5fa;
      padding: 0.15rem 0.6rem;
      border-radius: 60px;
      border: 1px solid #dce6ed;
      width: auto;
    }

    .priority-option {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.15rem 0.4rem 0.15rem 0.15rem;
      border-radius: 40px;
      white-space: nowrap;
    }

    .priority-option input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #b6c9d6;
      border-radius: 50%;
      margin: 0;
      padding: 0;
      background: white;
      cursor: pointer;
      min-height: 18px;
      min-width: 18px;
    }

    .priority-option input[type="radio"]:checked {
      border-color: #25D366;
      background: #25D366;
      box-shadow: inset 0 0 0 4px white, 0 0 0 1px #25D366;
    }

    .priority-option label {
      font-weight: 450;
      font-size: 0.85rem;
      color: #1d2e3b;
      cursor: pointer;
      margin: 0;
    }

    .priority-group-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
    }

    .priority-label {
      font-weight: 500;
      color: #1d2e3b;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .priority-label i {
      color: #25D366;
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      border: none;
      padding: 0.9rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 60px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px -8px rgba(37, 211, 102, 0.4);
      margin-top: 0.8rem;
      min-height: 56px;
      touch-action: manipulation;
    }

    .btn-whatsapp i {
      font-size: 1.4rem;
    }

    .btn-whatsapp:active {
      transform: scale(0.97);
      background: #1fa855;
    }

    .footnote {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #6b7f8d;
      border-top: 1px solid #e2ebf2;
      padding-top: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .footnote i {
      color: #25D366;
    }

    .preview-box {
      background: #f0f5fa;
      border-radius: 16px;
      padding: 0.8rem 1rem;
      margin-top: 0.5rem;
      border-left: 4px solid #25D366;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      color: #1d2e3b;
      max-height: 180px;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 0.75rem;
      color: #4b5f6e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .phone-input-wrapper {
      position: relative;
    }

    .phone-input-wrapper input {
      padding-left: 3.2rem;
    }

    .phone-prefix {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7f8d;
      font-weight: 500;
      font-size: 0.95rem;
      pointer-events: none;
    }

    .phone-hint {
      color: #6b7f8d;
      display: block;
      margin-top: 0.3rem;
      padding-left: 0.5rem;
      font-size: 0.75rem;
    }

    .phone-hint i {
      color: #25D366;
      margin-right: 0.3rem;
    }

    /* Toast notification */
    .toast {
      visibility: hidden;
      min-width: 250px;
      background: #333;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 12px 20px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.5s, visibility 0.5s;
      font-size: 0.9rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .toast.show {
      visibility: visible;
      opacity: 1;
    }

    .toast.success {
      background: #25D366;
    }

    .toast.error {
      background: #dc3545;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      body {
        padding: 0.8rem;
        align-items: flex-start;
        padding-top: 1.5rem;
      }

      .form-card {
        padding: 1.2rem 1rem;
        border-radius: 1.5rem;
      }

      h1 {
        font-size: 1.4rem;
      }

      h1 i {
        font-size: 1.4rem;
      }

      .subhead {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
        margin-bottom: 1.2rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        font-size: 0.85rem;
      }

      input,
      textarea,
      select {
        padding: 0.65rem 0.9rem;
        font-size: 0.95rem;
        min-height: 44px;
      }

      textarea {
        min-height: 80px;
      }

      .row-duo {
        flex-direction: column;
        gap: 0.5rem;
      }

      .row-duo .form-group {
        flex: 1 1 auto;
        min-width: unset;
      }

      .priority-group {
        padding: 0.1rem 0.4rem;
        gap: 0.2rem;
        width: 100%;
        justify-content: center;
      }

      .priority-option input[type="radio"] {
        width: 16px;
        height: 16px;
        min-height: 16px;
        min-width: 16px;
      }

      .priority-option label {
        font-size: 0.8rem;
      }

      .btn-whatsapp {
        padding: 0.8rem 1.2rem;
        font-size: 1rem;
        min-height: 50px;
      }

      .btn-whatsapp i {
        font-size: 1.2rem;
      }

      .preview-box {
        font-size: 0.75rem;
        padding: 0.6rem 0.8rem;
        max-height: 150px;
      }

      .phone-prefix {
        left: 1rem;
        font-size: 0.85rem;
      }

      .phone-input-wrapper input {
        padding-left: 2.8rem;
      }
    }

    @media (max-width: 380px) {
      .form-card {
        padding: 1rem 0.8rem;
      }

      h1 {
        font-size: 1.2rem;
      }

      input,
      textarea,
      select {
        padding: 0.55rem 0.8rem;
        font-size: 0.9rem;
        min-height: 40px;
      }
    }

    @supports (-webkit-touch-callout: none) {
      input,
      textarea,
      select,
      button {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <div class="form-card">
    <h1>
      <i class="fab fa-whatsapp"></i> Task · WhatsApp
    </h1>
    <div class="subhead">
      <i class="fas fa-arrow-right" style="margin-right: 8px;"></i> Works on any device
    </div>

    <form id="taskForm">
      <div class="form-group">
        <label for="taskTitle"><i class="fas fa-tag"></i> Task title</label>
        <input type="text" id="taskTitle" placeholder="e.g. Design homepage" required>
      </div>

      <div class="form-group">
        <label for="taskDesc"><i class="fas fa-align-left"></i> Description</label>
        <textarea id="taskDesc" placeholder="Describe the task in detail …" required></textarea>
      </div>

      <div class="row-duo">
        <div class="form-group">
          <label for="dueDate"><i class="fas fa-calendar-alt"></i> Due date</label>
          <input type="date" id="dueDate" required>
        </div>
        <div class="form-group">
          <div class="priority-group-wrapper">
            <span class="priority-label">
              <i class="fas fa-flag"></i> Priority
            </span>
            <span class="priority-group">
              <span class="priority-option">
                <input type="radio" name="priority" value="High" id="high" checked>
                <label for="high">High</label>
              </span>
              <span class="priority-option">
                <input type="radio" name="priority" value="Medium" id="medium">
                <label for="medium">Medium</label>
              </span>
              <span class="priority-option">
                <input type="radio" name="priority" value="Low" id="low">
                <label for="low">Low</label>
              </span>
            </span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="assignee"><i class="fas fa-user-check"></i> Assignee (optional)</label>
        <input type="text" id="assignee" placeholder="e.g. Maria or @team">
      </div>

      <div class="form-group">
        <label for="phoneNumber"><i class="fas fa-phone"></i> WhatsApp Number</label>
        <div class="phone-input-wrapper">
          <span class="phone-prefix">+91</span>
          <input type="tel" id="phoneNumber" placeholder="9503804591" value="9503804591">
        </div>
        <span class="phone-hint">
          <i class="fas fa-info-circle"></i> Enter 10-digit number (auto-adds +91)
        </span>
      </div>


      <button type="submit" class="btn-whatsapp" id="sendButton">
        <i class="fab fa-whatsapp"></i> Send to WhatsApp
      </button>
    </form>

    <div class="footnote">
      <i class="fas fa-globe"></i>
      <span>Works on all devices · Desktop · Mobile · Tablet</span>
    </div>
  </div>

  <script>
    // ============================================
    // UNIVERSAL DEVICE SUPPORT
    // Works on: iOS, Android, Windows, Mac, Linux
    // Browsers: Chrome, Safari, Firefox, Edge, Opera
    // ============================================

    // Live preview update
    document.addEventListener('DOMContentLoaded', function() {
      const titleInput = document.getElementById('taskTitle');
      const descInput = document.getElementById('taskDesc');
      const dateInput = document.getElementById('dueDate');
      const assigneeInput = document.getElementById('assignee');
      const priorityRadios = document.querySelectorAll('input[name="priority"]');
      const previewBox = document.getElementById('previewBox');

      function updatePreview() {
        const title = titleInput.value.trim() || '[Your task title]';
        const desc = descInput.value.trim() || '[Your description]';
        const dueDate = dateInput.value ? formatDate(dateInput.value) : '24 Jun 2026';
        const priority = document.querySelector('input[name="priority"]:checked')?.value || 'High';
        const assignee = assigneeInput.value.trim() || '[Assignee name]';

        previewBox.textContent =
          `*TASK DETAILS*
    ═════════════════════
    Title: ${title}
    Description: ${desc}
    Due date: ${dueDate}
    Priority: ${priority}
    Assignee: ${assignee}
    ═════════════════════`;
      }

      titleInput.addEventListener('input', updatePreview);
      descInput.addEventListener('input', updatePreview);
      dateInput.addEventListener('change', updatePreview);
      assigneeInput.addEventListener('input', updatePreview);
      priorityRadios.forEach(radio => radio.addEventListener('change', updatePreview));

      updatePreview();

      // Phone number - only digits
      document.getElementById('phoneNumber').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '');
      });

      // Set default date
      const dateInput2 = document.getElementById('dueDate');
      if (dateInput2) {
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const year = tomorrow.getFullYear();
        const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
        const day = String(tomorrow.getDate()).padStart(2, '0');
        dateInput2.value = `${year}-${month}-${day}`;
      }

      // Form submit handler
      document.getElementById('taskForm').addEventListener('submit', function(e) {
        e.preventDefault();
        sendToWhatsApp();
      });
    });

    /**
     * Show toast notification
     */
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    /**
     * Format date
     */
    function formatDate(dateString) {
      if (!dateString) return 'Not set';
      const parts = dateString.split('-');
      if (parts.length !== 3) return dateString;
      const year = parts[0];
      const month = parseInt(parts[1], 10);
      const day = parseInt(parts[2], 10);
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthName = monthNames[month - 1] || '??';
      return `${day} ${monthName} ${year}`;
    }

    /**
     * UNIVERSAL WHATSAPP SENDER
     * Works on ALL devices with multiple fallback methods
     */
    function sendToWhatsApp() {
      // Get form values
      const title = document.getElementById('taskTitle').value.trim();
      const desc = document.getElementById('taskDesc').value.trim();
      const dueDate = document.getElementById('dueDate').value;
      const assignee = document.getElementById('assignee').value.trim() || 'Not assigned';
      const priorityRadio = document.querySelector('input[name="priority"]:checked');
      const priority = priorityRadio ? priorityRadio.value : 'Medium';

      // Get and clean phone number
      let phoneInput = document.getElementById('phoneNumber').value.trim();
      let cleanNumber = phoneInput.replace(/\D/g, '');

      // Validate
      if (!title || !desc || !dueDate) {
        showToast('⚠️ Please fill in Title, Description and Due date.', 'error');
        return;
      }

      if (!cleanNumber || cleanNumber.length < 10) {
        showToast('⚠️ Please enter a valid 10-digit phone number.', 'error');
        return;
      }

      // Add country code if needed
      if (!cleanNumber.startsWith('91')) {
        cleanNumber = '91' + cleanNumber;
      }

      // Format message
      const formattedMessage =
        `*TASK DETAILS*
    ═════════════════════
    Title: ${title}
    Description: ${desc}
    Due date: ${formatDate(dueDate)}
    Priority: ${priority}
    Assignee: ${assignee}
    ═════════════════════`;

      const encodedMessage = encodeURIComponent(formattedMessage);
      const whatsappUrl = `https://wa.me/${cleanNumber}?text=${encodedMessage}`;

      // ============================================
      // UNIVERSAL OPEN METHOD - Works on ALL devices
      // ============================================

      // Method 1: Try to open in new window (works on most devices)
      try {
        const newWindow = window.open(whatsappUrl, '_blank');
        
        if (newWindow) {
          // Window opened successfully
          showToast('✅ Opening WhatsApp...', 'success');
          
          // For mobile: if window doesn't focus properly, try fallback
          setTimeout(() => {
            if (newWindow.closed === false) {
              try {
                newWindow.focus();
              } catch (e) {
                // Ignore focus errors
              }
            }
          }, 300);
          
          return;
        }
      } catch (e) {
        // If window.open fails, continue to next method
      }

      // Method 2: Direct navigation (works on mobile when popups are blocked)
      try {
        window.location.href = whatsappUrl;
        showToast('✅ Opening WhatsApp...', 'success');
        return;
      } catch (e) {
        // Continue to next method
      }

      // Method 3: Create and click a hidden link (universal fallback)
      try {
        const link = document.createElement('a');
        link.href = whatsappUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('✅ Opening WhatsApp...', 'success');
        return;
      } catch (e) {
        // Continue to next method
      }

      // Method 4: Final fallback - show message with URL
      const confirmOpen = confirm(
        `Unable to open WhatsApp automatically.\n\n` +
        `Please copy this link and paste in your browser:\n\n` +
        `${whatsappUrl}`
      );
      
      if (confirmOpen) {
        // Try to copy to clipboard
        try {
          navigator.clipboard.writeText(whatsappUrl).then(() => {
            showToast('📋 Link copied to clipboard!', 'success');
          }).catch(() => {
            // If clipboard fails, just show the link
            showToast('📋 Please copy the link manually', 'success');
          });
        } catch (e) {
          // If all fails, just show the link in console
          console.log('WhatsApp URL:', whatsappUrl);
        }
      }
    }

    // ============================================
    // DETECT DEVICE TYPE (for debugging/analytics)
    // ============================================
    function detectDevice() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      
      if (/android/i.test(ua)) {
        return 'Android';
      }
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        return 'iOS';
      }
      if (/Windows/i.test(ua)) {
        return 'Windows';
      }
      if (/Mac/i.test(ua)) {
        return 'Mac';
      }
      if (/Linux/i.test(ua)) {
        return 'Linux';
      }
      return 'Unknown';
    }

    // Log device for debugging (optional)
    console.log('📱 Device detected:', detectDevice());
    console.log('🌐 Browser:', navigator.userAgent);
  </script>

</body>

</html>
