<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Task · WhatsApp Form</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1a2b 0%, #1a2f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .form-card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-height: 90vh;
      overflow-y: auto;
    }
  
    .form-card::-webkit-scrollbar {
      width: 6px;
    }
    .form-card::-webkit-scrollbar-track {
      background: #f0f5fa;
      border-radius: 10px;
    }
    .form-card::-webkit-scrollbar-thumb {
      background: #25D366;
      border-radius: 10px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1e2f3f;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }

    h1 i {
      color: #25D366;
      font-size: 1.8rem;
    }

    .subhead {
      color: #4b5f6e;
      font-size: 0.9rem;
      border-left: 4px solid #25D366;
      padding: 0.5rem 1rem;
      margin-bottom: 1.5rem;
      background: #eef4f8;
      border-radius: 0 20px 20px 0;
      display: inline-block;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: #1d2e3b;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }

    label i {
      color: #25D366;
      width: 1.2rem;
    }

    /* Task Item */
    .task-item {
      background: #f8fafc;
      border: 1.5px solid #e8edf2;
      border-radius: 1.2rem;
      padding: 1rem 1rem 0.8rem;
      margin-bottom: 0.8rem;
      position: relative;
      transition: all 0.3s ease;
    }

    .task-item:hover {
      border-color: #25D366;
      box-shadow: 0 2px 12px rgba(37, 211, 102, 0.08);
    }

    .task-item .remove-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #fee2e2;
      border: none;
      color: #dc2626;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      opacity: 0.7;
    }

    .task-item .remove-btn:hover {
      background: #dc2626;
      color: white;
      opacity: 1;
      transform: scale(1.1);
    }

    .task-item .remove-btn:active {
      transform: scale(0.9);
    }

    .task-item .item-number {
      display: inline-block;
      background: #25D366;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.6rem;
      border-radius: 20px;
      margin-bottom: 0.5rem;
    }

    .task-item .form-group {
      margin-bottom: 0.6rem;
    }

    .task-item .form-group:last-child {
      margin-bottom: 0;
    }

    .task-item input,
    .task-item textarea,
    .task-item select {
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      min-height: 40px;
      background: white;
    }

    .task-item textarea {
      min-height: 55px;
    }

    .task-item .priority-group {
      padding: 0.1rem 0.4rem;
      gap: 0.2rem;
    }

    .task-item .priority-option input[type="radio"] {
      width: 15px;
      height: 15px;
      min-height: 15px;
      min-width: 15px;
    }

    .task-item .priority-option label {
      font-size: 0.8rem;
    }

    .task-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .task-row .form-group {
      flex: 1;
      min-width: 120px;
      margin-bottom: 0;
    }

    .task-row .form-group:first-child {
      flex: 2;
    }

    /* Add More Button */
    .add-more-btn {
      background: transparent;
      border: 2px dashed #25D366;
      color: #25D366;
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .add-more-btn:hover {
      background: #25D366;
      color: white;
      border-color: #25D366;
    }

    .add-more-btn:active {
      transform: scale(0.97);
    }

    .add-more-btn i {
      font-size: 1rem;
    }

    /* Main form fields */
    input,
    textarea,
    select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #dce6ed;
      border-radius: 1.8rem;
      font-size: 1rem;
      background: #fafcfe;
      transition: all 0.15s ease;
      outline: none;
      color: #1a2b37;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.15);
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .row-duo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .row-duo .form-group {
      flex: 1 1 160px;
      min-width: 140px;
    }

    .priority-group {
      display: inline-flex;
      flex-wrap: nowrap;
      gap: 0.4rem;
      align-items: center;
      background: #f0f5fa;
      padding: 0.15rem 0.6rem;
      border-radius: 60px;
      border: 1px solid #dce6ed;
      width: auto;
    }

    .priority-option {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.15rem 0.4rem 0.15rem 0.15rem;
      border-radius: 40px;
      white-space: nowrap;
    }

    .priority-option input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #b6c9d6;
      border-radius: 50%;
      margin: 0;
      padding: 0;
      background: white;
      cursor: pointer;
      min-height: 18px;
      min-width: 18px;
    }

    .priority-option input[type="radio"]:checked {
      border-color: #25D366;
      background: #25D366;
      box-shadow: inset 0 0 0 4px white, 0 0 0 1px #25D366;
    }

    .priority-option label {
      font-weight: 450;
      font-size: 0.85rem;
      color: #1d2e3b;
      cursor: pointer;
      margin: 0;
    }

    .priority-group-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem 1rem;
          margin-bottom: 17px;
    }

    .priority-label {
      font-weight: 500;
      color: #1d2e3b;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .priority-label i {
      color: #25D366;
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      border: none;
      padding: 0.9rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 60px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px -8px rgba(37, 211, 102, 0.4);
      margin-top: 0.8rem;
      min-height: 56px;
      touch-action: manipulation;
    }

    .btn-whatsapp i {
      font-size: 1.4rem;
    }

    .btn-whatsapp:active {
      transform: scale(0.97);
      background: #1fa855;
    }

    .footnote {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #6b7f8d;
      border-top: 1px solid #e2ebf2;
      padding-top: 1rem;
    }

    .footnote i {
      color: #25D366;
    }

    .phone-input-wrapper {
      position: relative;
    }

    .phone-input-wrapper input {
      padding-left: 3.2rem;
    }

    .phone-prefix {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7f8d;
      font-weight: 500;
      font-size: 0.95rem;
      pointer-events: none;
    }

    .phone-hint {
      color: #6b7f8d;
      display: block;
      margin-top: 0.3rem;
      padding-left: 0.5rem;
      font-size: 0.75rem;
    }

    .phone-hint i {
      color: #25D366;
      margin-right: 0.3rem;
    }

    .toast {
      visibility: hidden;
      min-width: 250px;
      background: #333;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 12px 20px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.5s, visibility 0.5s;
      font-size: 0.9rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .toast.show {
      visibility: visible;
      opacity: 1;
    }

    .toast.success {
      background: #25D366;
    }

    .toast.error {
      background: #dc3545;
    }

    .task-counter {
      font-size: 0.8rem;
      color: #6b7f8d;
      margin-left: 0.5rem;
      font-weight: 400;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      body {
        padding: 0.5rem;
        align-items: flex-start;
        padding-top: 1rem;
      }

      .form-card {
        padding: 1rem 0.8rem;
        border-radius: 1.5rem;
        max-height: 95vh;
      }

      h1 {
        font-size: 1.3rem;
      }

      h1 i {
        font-size: 1.3rem;
      }

      .subhead {
        font-size: 0.75rem;
        padding: 0.3rem 0.7rem;
        margin-bottom: 1rem;
      }

      .form-group {
        margin-bottom: 0.8rem;
      }

      label {
        font-size: 0.8rem;
      }

      input,
      textarea,
      select {
        padding: 0.6rem 0.8rem;
        font-size: 0.9rem;
        min-height: 40px;
      }

      textarea {
        min-height: 70px;
      }

      .task-item {
        padding: 0.8rem 0.8rem 0.6rem;
        border-radius: 1rem;
      }

      .task-item .form-group {
        margin-bottom: 0.5rem;
      }

      .task-item input,
      .task-item textarea {
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
        min-height: 36px;
      }

      .task-item textarea {
        min-height: 50px;
      }

      .task-row {
        flex-direction: column;
        gap: 0.5rem;
      }

      .task-row .form-group {
        width: 100%;
        min-width: unset;
      }

      .row-duo {
        flex-direction: column;
        gap: 0.3rem;
      }

      .row-duo .form-group {
        flex: 1 1 auto;
        min-width: unset;
      }

      .priority-group {
        padding: 0.1rem 0.4rem;
        gap: 0.15rem;
        width: 100%;
        justify-content: center;
      }

      .priority-option input[type="radio"] {
        width: 15px;
        height: 15px;
        min-height: 15px;
        min-width: 15px;
      }

      .priority-option label {
        font-size: 0.75rem;
      }

      .btn-whatsapp {
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
        min-height: 46px;
      }

      .btn-whatsapp i {
        font-size: 1.1rem;
      }

      .phone-prefix {
        left: 0.8rem;
        font-size: 0.8rem;
      }

      .phone-input-wrapper input {
        padding-left: 2.5rem;
      }

      .add-more-btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
      }

      .task-item .remove-btn {
        width: 24px;
        height: 24px;
        font-size: 0.7rem;
        top: 0.3rem;
        right: 0.3rem;
      }
    }

    @media (max-width: 380px) {
      .form-card {
        padding: 0.8rem 0.6rem;
      }

      h1 {
        font-size: 1.1rem;
              margin-bottom: 25px;

      }

      input,
      textarea,
      select {
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
        min-height: 36px;
      }

      .task-item input,
      .task-item textarea {
        padding: 0.4rem 0.6rem;
        font-size: 0.8rem;
        min-height: 32px;
      }
    }

    @supports (-webkit-touch-callout: none) {
      input,
      textarea,
      select,
      button {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div id="toast" class="toast"></div>

  <div class="form-card">
    <h1>
      <i class="fab fa-whatsapp"></i> Task · WhatsApp
    </h1>

    <form id="taskForm">
      <!-- Date and WhatsApp Number in One Line -->
      <div class="row-duo">
        <div class="form-group">
          <label for="dueDate"><i class="fas fa-calendar-alt"></i> Due date</label>
          <input type="date" id="dueDate" required>
        </div>
        <div class="form-group">
          <label for="phoneNumber"><i class="fas fa-phone"></i> WhatsApp Number</label>
          <div class="phone-input-wrapper">
            <span class="phone-prefix">+91</span>
            <input type="tel" id="phoneNumber" placeholder="9167670209" value="9167670209">
          </div>
        </div>
      </div>

      <!-- Task Items Container -->
      <div id="taskContainer">
        <!-- Task 1 (Default) -->
        <div class="task-item" data-task-id="1">
          <span class="item-number">Task 1</span>
          <button type="button" class="remove-btn" onclick="removeTask(this)" title="Remove task">
            <i class="fas fa-times"></i>
          </button>
          
          <!-- Task Row: Title + Priority in one line -->
          <div class="task-row">
            <div class="form-group">
              <label><i class="fas fa-tag"></i> Task Title</label>
              <input type="text" class="task-title" placeholder="e.g. Design homepage" required>
            </div>
            <div class="form-group">
              <div class="priority-group-wrapper">
                <span class="priority-label">
                  <i class="fas fa-flag"></i> Priority
                </span>
                <span class="priority-group">
                  <span class="priority-option">
                    <input type="radio" name="priority_1" value="High" class="task-priority" checked>
                    <label>High</label>
                  </span>
                  <span class="priority-option">
                    <input type="radio" name="priority_1" value="Medium" class="task-priority">
                    <label>Medium</label>
                  </span>
                  <span class="priority-option">
                    <input type="radio" name="priority_1" value="Low" class="task-priority">
                    <label>Low</label>
                  </span>
                </span>
              </div>
            </div>
          </div>

          <!-- Description below -->
          <div class="form-group">
            <label><i class="fas fa-align-left"></i> Description</label>
            <textarea class="task-desc" placeholder="Describe the task in detail …" required></textarea>
          </div>
        </div>
      </div>

      <!-- Add More Button -->
      <button type="button" class="add-more-btn" onclick="addTask()">
        <i class="fas fa-plus-circle"></i> Add More Task
      </button>

      <button type="submit" class="btn-whatsapp">
        <i class="fab fa-whatsapp"></i> Send to WhatsApp
      </button>
    </form>


  </div>

  <script>
    let taskCounter = 1;

    // ============================================
    // ADD / REMOVE TASKS
    // ============================================
    
    function addTask() {
      taskCounter++;
      const container = document.getElementById('taskContainer');
      
      const taskItem = document.createElement('div');
      taskItem.className = 'task-item';
      taskItem.dataset.taskId = taskCounter;
      
      taskItem.innerHTML = `
        <span class="item-number">Task ${taskCounter}</span>
        <button type="button" class="remove-btn" onclick="removeTask(this)" title="Remove task">
          <i class="fas fa-times"></i>
        </button>
        
        <div class="task-row">
          <div class="form-group">
            <label><i class="fas fa-tag"></i> Task Title</label>
            <input type="text" class="task-title" placeholder="e.g. Design homepage" required>
          </div>
          <div class="form-group">
            <div class="priority-group-wrapper">
              <span class="priority-label">
                <i class="fas fa-flag"></i> Priority
              </span>
              <span class="priority-group">
                <span class="priority-option">
                  <input type="radio" name="priority_${taskCounter}" value="High" class="task-priority" checked>
                  <label>High</label>
                </span>
                <span class="priority-option">
                  <input type="radio" name="priority_${taskCounter}" value="Medium" class="task-priority">
                  <label>Medium</label>
                </span>
                <span class="priority-option">
                  <input type="radio" name="priority_${taskCounter}" value="Low" class="task-priority">
                  <label>Low</label>
                </span>
              </span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-align-left"></i> Description</label>
          <textarea class="task-desc" placeholder="Describe the task in detail …" required></textarea>
        </div>
      `;
      
      container.appendChild(taskItem);
      
      // Attach input events for message building
      attachTaskEvents(taskItem);
      
      // Show toast
      showToast(`✅ Task ${taskCounter} added`, 'success');
      
      // Scroll to new task
      taskItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function removeTask(btn) {
      const taskItem = btn.closest('.task-item');
      const taskId = taskItem.dataset.taskId;
      
      // Don't remove if only one task remains
      const totalTasks = document.querySelectorAll('.task-item').length;
      if (totalTasks <= 1) {
        showToast('⚠️ At least one task is required', 'error');
        return;
      }
      
      if (confirm(`Remove Task ${taskId}?`)) {
        taskItem.style.transition = 'all 0.3s ease';
        taskItem.style.transform = 'translateX(100%)';
        taskItem.style.opacity = '0';
        
        setTimeout(() => {
          taskItem.remove();
          updateTaskNumbers();
          showToast(`🗑️ Task ${taskId} removed`, 'success');
        }, 300);
      }
    }

    function updateTaskNumbers() {
      const tasks = document.querySelectorAll('.task-item');
      tasks.forEach((task, index) => {
        const num = index + 1;
        const numberSpan = task.querySelector('.item-number');
        if (numberSpan) {
          numberSpan.textContent = `Task ${num}`;
        }
        const radios = task.querySelectorAll('.task-priority');
        radios.forEach(radio => {
          radio.name = `priority_${num}`;
        });
        task.dataset.taskId = num;
      });
      taskCounter = tasks.length;
    }

    function attachTaskEvents(taskItem) {
      const inputs = taskItem.querySelectorAll('input, textarea');
      inputs.forEach(input => {
        input.addEventListener('input', function() {
          // No preview needed
        });
      });
    }

    // ============================================
    // TOAST NOTIFICATION
    // ============================================

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // ============================================
    // FORMAT DATE
    // ============================================

    function formatDate(dateString) {
      if (!dateString) return 'Not set';
      const parts = dateString.split('-');
      if (parts.length !== 3) return dateString;
      const year = parts[0];
      const month = parseInt(parts[1], 10);
      const day = parseInt(parts[2], 10);
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthName = monthNames[month - 1] || '??';
      return `${day} ${monthName} ${year}`;
    }

    // ============================================
    // SEND TO WHATSAPP - FIXED VERSION
    // ============================================

    function sendToWhatsApp(event) {
      event.preventDefault();

      const tasks = document.querySelectorAll('.task-item');
      const dueDate = document.getElementById('dueDate').value;
      
      // Get phone number
      let phoneInput = document.getElementById('phoneNumber').value.trim();
      let cleanNumber = phoneInput.replace(/\D/g, '');
      
      if (!cleanNumber || cleanNumber.length < 10) {
        showToast('⚠️ Please enter a valid 10-digit phone number.', 'error');
        return;
      }
      
      if (!cleanNumber.startsWith('91')) {
        cleanNumber = '91' + cleanNumber;
      }

      // ===== FIX: Initialize message variable properly =====
      let message = '';  // <-- THIS WAS MISSING!
      
      // Build message with exact format
      message += 'TASK DETAILS\n\n';
      message += 'DATE: ' + formatDate(dueDate) + '\n\n';
      
      let hasError = false;
      tasks.forEach((task, index) => {
        const title = task.querySelector('.task-title')?.value.trim();
        const desc = task.querySelector('.task-desc')?.value.trim();
        const priority = task.querySelector('.task-priority:checked')?.value || 'Medium';
        
        if (!title || !desc) {
          hasError = true;
          showToast(`Please fill Task ${index + 1} completely`, 'error');
          return;
        }
        
        message += `Task ${index + 1}:\n`;
        message += `Title: ${title}\n`;
        message += `Description: ${desc}\n`;
        message += `Priority: ${priority}\n\n`;
      });
      
      if (hasError) return;
      
      if (!dueDate) {
        showToast('Please select a due date.', 'error');
        return;
      }

      // Send to WhatsApp
      const encodedMessage = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/${cleanNumber}?text=${encodedMessage}`;

      // Universal open methods
      try {
        const newWindow = window.open(whatsappUrl, '_blank');
        if (newWindow) {
          showToast('✅ Opening WhatsApp...', 'success');
          setTimeout(() => {
            try { newWindow.focus(); } catch(e) {}
          }, 300);
          return;
        }
      } catch(e) {}

      try {
        window.location.href = whatsappUrl;
        showToast('✅ Opening WhatsApp...', 'success');
        return;
      } catch(e) {}

      try {
        const link = document.createElement('a');
        link.href = whatsappUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('✅ Opening WhatsApp...', 'success');
        return;
      } catch(e) {}

      const confirmOpen = confirm(
        `Unable to open WhatsApp automatically.\n\n` +
        `Please copy this link and paste in your browser:\n\n${whatsappUrl}`
      );
      
      if (confirmOpen) {
        try {
          navigator.clipboard.writeText(whatsappUrl).then(() => {
            showToast('📋 Link copied to clipboard!', 'success');
          }).catch(() => {
            showToast('📋 Please copy the link manually', 'success');
          });
        } catch(e) {
          console.log('WhatsApp URL:', whatsappUrl);
        }
      }
    }

    // ============================================
    // INITIALIZATION
    // ============================================

    document.addEventListener('DOMContentLoaded', function() {
      // Set default date
      const dateInput = document.getElementById('dueDate');
      if (dateInput) {
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const year = tomorrow.getFullYear();
        const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
        const day = String(tomorrow.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
      }

      // Phone number - only digits
      document.getElementById('phoneNumber').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '');
      });

      // Form submit
      document.getElementById('taskForm').addEventListener('submit', sendToWhatsApp);
    });
  </script>

</body>
